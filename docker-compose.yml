version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medical_ai_postgres
    restart: always
    environment:
      POSTGRES_DB: medical_ai_db
      POSTGRES_USER: medical_ai_user
      POSTGRES_PASSWORD: medical_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: medical_ai_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: medical_ai_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: medical_ai_mq_user
      RABBITMQ_DEFAULT_PASS: medical_ai_mq_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.docker_data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.docker_data/redis
  rabbitmq_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.docker_data/rabbitmq
